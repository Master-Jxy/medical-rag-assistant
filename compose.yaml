name: ${COMPOSE_PROJECT_NAME:-medical-rag}

services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --innodb-buffer-pool-size=128M
      - --max-connections=50
      - --performance-schema=OFF
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    mem_limit: 512m
    networks:
      app_net:
        ipv4_address: 172.30.0.30

  redis:
    image: redis:6.2
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --maxmemory
      - 96mb
      - --maxmemory-policy
      - noeviction
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    mem_limit: 160m
    networks:
      app_net:
        ipv4_address: 172.30.0.40

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}
      DATABASE_URL: mysql+pymysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}?charset=utf8mb4
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      CHAT_MODEL_NAME: ${CHAT_MODEL_NAME:-qwen3-max}
      EMBEDDING_MODEL_NAME: ${EMBEDDING_MODEL_NAME:-text-embedding-v4}
      CHROMA_PERSIST_DIR: /app/chroma_db
      CHROMA_COLLECTION_NAME: ${CHROMA_COLLECTION_NAME:-agent}
      UPLOAD_DIR: /app/data/uploads
      DOCUMENT_REGISTRY_PATH: /app/data/documents.json
      CORS_ORIGINS: '[]'
      TRUSTED_PROXY_IPS: '["172.30.0.10"]'
      TZ: Asia/Shanghai
    volumes:
      - app_data:/app/data
      - chroma_data:/app/chroma_db
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    mem_limit: 768m
    networks:
      app_net:
        ipv4_address: 172.30.0.20

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -f /usr/share/nginx/html/index.html && nginx -t"]
      interval: 15s
      timeout: 3s
      retries: 5
    mem_limit: 96m
    networks:
      app_net:
        ipv4_address: 172.30.0.10

volumes:
  mysql_data:
  redis_data:
  app_data:
  chroma_data:

networks:
  app_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24
